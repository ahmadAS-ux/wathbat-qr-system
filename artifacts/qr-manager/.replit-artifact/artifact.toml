kind = "web"
previewPath = "/"
title = "QR Asset Manager"
version = "1.0.0"
id = "artifacts/qr-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23557

[services.development]
run = "pnpm --filter @workspace/qr-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qr-manager", "run", "build" ]
publicDir = "artifacts/qr-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23557"
BASE_PATH = "/"
